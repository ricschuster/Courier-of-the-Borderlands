version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    groups:
      dev-dependencies:
        dependency-type: development
    # Hold the TypeScript major: typescript-eslint's peer range caps at
    # <6.1.0, so TS 7 breaks `npm ci` (2026-07-12). Re-allow by removing this
    # once typescript-eslint supports TS 7.
    ignore:
      - dependency-name: typescript
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
