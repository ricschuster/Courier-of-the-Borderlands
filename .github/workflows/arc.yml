name: Arc

# The full three-region playthrough (~3m of real-time driving) is the guard
# against a soft-locked critical path. It runs:
#   - on push to main, as on-merge coverage;
#   - nightly, as a heartbeat.
#
# It deliberately does NOT run pre-merge on PRs. Arc is not a required status
# check, and PRs auto-merge on `check` + `e2e`, so a pre-merge Arc never gated
# a merge; it only paid for the same ~4-16m playthrough a second time. The
# on-merge run on main is the real signal, minutes later.
on:
  push:
    branches: [main, fix/arc-coast-past-home]
    paths:
      - 'src/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/arc.yml'
  schedule:
    - cron: '0 7 * * *'
  # Manual trigger, so the arc can be validated on any branch (it otherwise only
  # runs post-merge on main). Useful when hardening the driver against a flake:
  # the stall only reproduces under a loaded CI runner, not locally.
  workflow_dispatch:

concurrency:
  group: arc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  arc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Full-arc playthrough
        run: npx playwright test full-arc
        env:
          RUN_ARC: '1'

      # The arc only flakes under CI load, never locally, so the Playwright
      # trace and error context from a failed run are the only ground truth
      # available. Without this upload they are discarded with the runner.
      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: arc-test-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
