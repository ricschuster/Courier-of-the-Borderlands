name: Arc

# The full three-region playthrough (~3m of real-time driving) is the guard
# against a soft-locked critical path. It runs:
#   - pre-merge, on PRs that touch game code or the e2e harness (path filter
#     below), so a break is caught on the PR before it can land on main;
#   - on push to main, as belt-and-braces on-merge coverage;
#   - nightly, as a heartbeat.
# Docs-only and config-only PRs do not match the paths, so they stay fast.
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/arc.yml'
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'

concurrency:
  group: arc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  arc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Full-arc playthrough
        run: npx playwright test full-arc
        env:
          RUN_ARC: '1'
