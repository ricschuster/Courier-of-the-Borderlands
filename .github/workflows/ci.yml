name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Validate the workflow files themselves. deploy.yml and release-please.yml
      # only run on push to main, so an error in them cannot surface until after
      # merge: #246 was a step-level `if:` reading the secrets context, which is
      # not available there. It went green, merged, and broke every subsequent
      # run on main. Runs before the Node steps so a bad workflow fails fast.
      # Pinned to a release binary and checksummed: no npm dependency, and no
      # third-party action in the path of a required check.
      - name: Lint workflows
        env:
          ACTIONLINT_VERSION: 1.7.7
          ACTIONLINT_SHA256: 023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
        run: |
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum --check --strict -
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color
          rm -f actionlint actionlint.tar.gz

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Runs the same unit suite as `npm test` and additionally enforces the
      # coverage thresholds on src/systems (see vite.config.ts). One run rather
      # than two: the coverage pass is a superset, so a separate `npm test` step
      # would only execute the same 842 tests again.
      - name: Test and coverage gate
        run: npm run test:coverage

      - name: Build
        run: npm run build

  e2e:
    # The fast browser specs run on every PR and push. The full-arc playthrough
    # skips itself here (it is gated on RUN_ARC); the dedicated Arc workflow runs
    # it pre-merge on code-touching PRs, on merge to main, and nightly.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke test
        run: npm run test:e2e
