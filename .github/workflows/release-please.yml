name: Release Please

# Keeps a standing "release PR" open on main that lists every user-facing change
# queued since the last release, built from Conventional Commit messages. The PR
# is the release nudge: merge it to cut a release (tag + GitHub Release +
# CHANGELOG update), or leave it and it keeps updating as more commits land. See
# docs/decisions/0007-release-versioning.md.

on:
  push:
    branches: [main]
  # Re-run release-please on demand from the Actions tab. Without this the only
  # way to make it reconsider the release PR is to land another commit on main,
  # which is a poor fit for the times you need it most: after fixing the token
  # (#238), or after rotating it (#243), when there is nothing to commit and you
  # just want to know whether it works now.
  workflow_dispatch:

# release-please opens/updates the release PR and, on merge, creates the tag and
# GitHub Release, so it needs write access to contents and pull requests. These
# apply to the fallback GITHUB_TOKEN; RELEASE_PLEASE_TOKEN carries its own scopes.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # The fallback below is deliberately silent so a missing secret cannot break
      # releases, but silence is exactly what made #238 hard to see: an empty or
      # unset token looks identical to a working one until a release PR turns up
      # with no checks and nobody remembers why. Say so in the log instead.
      # (`gh secret set` with no TTY stores an empty value and exits 0, so
      # "the secret exists" is not evidence that it has a value.)
      #
      # The check reads the token through `env` and tests it in the shell. The
      # `secrets` context is not available to a step-level `if:` (only github,
      # env, needs, and a few others are), so `if: secrets.X == ''` is not a
      # valid workflow file at all. Actions surfaces that as a failed run with no
      # job, and nothing in CI validates workflow files, so it lands green.
      - name: Warn when the release token is missing
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::warning::RELEASE_PLEASE_TOKEN is unset or empty, so release-please is falling back to GITHUB_TOKEN. The release PR will get no CI and cannot merge. See issue 238."
          else
            echo "RELEASE_PLEASE_TOKEN is set; release PRs should receive CI."
          fi

      # Runs as RELEASE_PLEASE_TOKEN when that secret exists, falling back to the
      # default GITHUB_TOKEN when it does not. The fallback matters: GitHub does
      # not raise `pull_request` events for actions taken by GITHUB_TOKEN (it
      # prevents recursive workflow runs), so a release PR opened with it gets no
      # CI, and `main`'s required checks then block the merge. With a PAT or App
      # token the PR is authored by a real identity, CI runs, and the release PR
      # can merge unattended. See #238 and docs/decisions/0007-release-versioning.md.
      #
      # The token expires 2026-12-31. On expiry this silently falls back to the
      # blocked-PR behaviour above rather than failing loudly. Rotation: #243.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
