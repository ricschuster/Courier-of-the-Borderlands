name: Deploy

# Deploy only after CI succeeds on main, so an untested build never publishes.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Publishing to the gh-pages branch requires write access to repo contents.
permissions:
  contents: write

# Serialize every writer of the gh-pages branch (this deploy and the per-PR
# preview workflow) so their commits never race. Queue rather than cancel: a
# superseded deploy still matters because the next one may be a preview, not a
# newer main build.
concurrency:
  group: gh-pages-write
  cancel-in-progress: false

jobs:
  deploy:
    # Manual runs always deploy; automatic runs only when CI passed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      # Pages serves the branch as-is; .nojekyll stops it from running Jekyll.
      - name: Add .nojekyll
        run: touch dist/.nojekyll

      # Publish the built site to the gh-pages branch root. clean-exclude keeps
      # the pr-preview/ subtree the preview workflow manages, so a main deploy
      # refreshes the live game without wiping open PR previews.
      - name: Publish to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          clean-exclude: |
            pr-preview
