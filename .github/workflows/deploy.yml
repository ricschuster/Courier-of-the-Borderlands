name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishing to the gh-pages branch requires write access to repo contents.
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      # Publish the built site to the gh-pages branch. GitHub Pages serves this
      # branch directly. .nojekyll keeps Pages from running Jekyll over it.
      # This avoids the actions/deploy-pages pipeline, which was failing with an
      # opaque "Deployment failed, try again later" at the publish step.
      - name: Publish dist to gh-pages
        run: |
          cd dist
          touch .nojekyll
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
